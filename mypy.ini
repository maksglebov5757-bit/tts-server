# FILE: mypy.ini
# VERSION: 1.0.0
# Mypy static type-checking configuration for the TTS server project.
#
# This configuration is intentionally lenient at first so it can be enabled
# incrementally without producing noise on legacy modules. As individual
# packages are tightened, raise their per-module strictness via the
# `[mypy-<module>.*]` blocks below.

[mypy]
python_version = 3.11
mypy_path = .

# Treat the project root as the source root so first-party imports resolve.
files = core, server, telegram_bot, cli, launcher, profiles, scripts

# Friendly defaults that flag obvious type errors without forcing strict mode.
ignore_missing_imports = True
follow_imports = silent
warn_unused_ignores = True
warn_redundant_casts = True
warn_unreachable = False
no_implicit_optional = True
strict_equality = True
check_untyped_defs = False
disallow_any_unimported = False
disallow_untyped_defs = False
disallow_incomplete_defs = False
disallow_subclassing_any = False
warn_no_return = True
show_error_codes = True
pretty = True

# Tests and integration scaffolding stay outside the type-check surface for now.
exclude = (?x)(
    ^tests/
    | ^\.venv
    | ^\.models
    | ^\.outputs
    | ^\.uploads
    | ^\.voices
    | ^build/
    | ^dist/
    | ^frontend_demo/
  )

# START_BLOCK_PER_MODULE_OVERRIDES
# Heavy ML and audio dependencies don't ship type stubs.
[mypy-torch.*]
ignore_missing_imports = True

[mypy-torchaudio.*]
ignore_missing_imports = True

[mypy-transformers.*]
ignore_missing_imports = True

[mypy-onnxruntime.*]
ignore_missing_imports = True

[mypy-mlx.*]
ignore_missing_imports = True

[mypy-soundfile.*]
ignore_missing_imports = True

[mypy-numpy.*]
ignore_missing_imports = True

[mypy-scipy.*]
ignore_missing_imports = True

[mypy-piper.*]
ignore_missing_imports = True

[mypy-pyloudnorm.*]
ignore_missing_imports = True

[mypy-omnivoice.*]
ignore_missing_imports = True

[mypy-faster_qwen3_tts.*]
ignore_missing_imports = True
# END_BLOCK_PER_MODULE_OVERRIDES
