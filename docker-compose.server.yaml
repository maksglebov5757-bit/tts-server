services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    image: qwen3-tts-server:dev
    command: ["python", "-m", "uvicorn", "server:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "${TTS_SERVER_PORT:-8000}:8000"
    environment:
      TTS_BACKEND: ${TTS_BACKEND:-torch}
      TTS_BACKEND_AUTOSELECT: ${TTS_BACKEND_AUTOSELECT:-true}
      TTS_HOST: 0.0.0.0
      TTS_PORT: "8000"
      TTS_MODELS_DIR: /app/.models
      TTS_OUTPUTS_DIR: /app/.outputs
      TTS_VOICES_DIR: /app/.voices
      TTS_UPLOAD_STAGING_DIR: /app/.uploads
    volumes:
      - ./.models:/app/.models
      - ./.outputs:/app/.outputs
      - ./.uploads:/app/.uploads
      - ./.voices:/app/.voices
    restart: unless-stopped
