# FILE: .pre-commit-config.yaml
# VERSION: 1.0.0
# Pre-commit hook configuration for the TTS server project.
#
# Run on staged files automatically (`pre-commit install` once per clone).
# Run on the whole tree manually with `pre-commit run --all-files`.
#
# Hooks intentionally enabled by default:
#   - ruff (lint, with safe autofix)
#   - ruff-format (formatter, in --check mode so existing files are not
#     mass-rewritten until they're touched)
#   - basic hygiene checks (trailing whitespace, end-of-file fixer,
#     YAML/TOML/JSON syntax, large files)
#   - the project's existing GRACE pre-commit script
#
# Hooks gated to the `manual` stage (run via `pre-commit run --hook-stage manual`):
#   - mypy (still being adopted incrementally)

default_stages: [pre-commit]

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        name: ruff lint
        args: ["--fix"]
      - id: ruff-format
        name: ruff format
        args: ["--check"]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(\.models/|\.outputs/|\.uploads/|\.voices/|frontend_demo/)
      - id: end-of-file-fixer
        exclude: ^(\.models/|\.outputs/|\.uploads/|\.voices/|frontend_demo/)
      - id: check-yaml
      - id: check-toml
      - id: check-json
        exclude: ^core/models/manifest\.v1\.json$
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]

  - repo: local
    hooks:
      - id: grace-lint
        name: GRACE markup lint
        entry: bash scripts/pre-commit
        language: system
        pass_filenames: false
        require_serial: true
        stages: [pre-commit]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        name: mypy (manual stage)
        stages: [manual]
        additional_dependencies:
          - "pydantic>=2.0"
          - "pydantic-settings>=2.0"
          - "fastapi>=0.100"
        args: ["--config-file=mypy.ini"]
