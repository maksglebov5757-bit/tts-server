name: ci

on:
  push:
  pull_request:

jobs:
  test-macos:
    name: macOS release-hardening checks
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        if: ${{ !env.ACT }}
        with:
          python-version: '3.11'
      - name: Install system dependencies
        if: ${{ !env.ACT }}
        run: brew install ffmpeg
      - name: Install Python dependencies
        if: ${{ !env.ACT }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
      - name: Install Python dependencies under act
        if: ${{ env.ACT }}
        run: |
          python3 --version
          python3 -m pip install --upgrade pip --trusted-host pypi.org --trusted-host pypi.python.org --trusted-host files.pythonhosted.org
          python3 -m pip install --trusted-host pypi.org --trusted-host pypi.python.org --trusted-host files.pythonhosted.org -r requirements-ci.txt
      - name: Run GRACE lint when available
        run: |
          if command -v grace >/dev/null 2>&1; then
            grace lint --path "$GITHUB_WORKSPACE"
          else
            echo "grace CLI is not available in CI image; skipping optional GRACE lint step"
          fi
      - name: Run runtime self-check
        if: ${{ !env.ACT }}
        run: python scripts/runtime_self_check.py
      - name: Run runtime self-check under act
        if: ${{ env.ACT }}
        run: python3 scripts/runtime_self_check.py
      - name: Run host matrix validation
        if: ${{ !env.ACT }}
        run: python scripts/validate_runtime.py host-matrix
      - name: Run host matrix validation under act
        if: ${{ env.ACT }}
        run: python3 scripts/validate_runtime.py host-matrix
      - name: Run unit and integration tests
        if: ${{ !env.ACT }}
        run: python -m pytest -m "unit or integration"
      - name: Run unit and integration tests under act
        if: ${{ env.ACT }}
        run: python3 -m pytest -m "unit or integration"

  test-linux:
    name: Linux release-hardening checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        if: ${{ !env.ACT }}
        with:
          python-version: '3.11'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg espeak-ng
      - name: Install Python dependencies
        if: ${{ !env.ACT }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
      - name: Install Python dependencies under act
        if: ${{ env.ACT }}
        run: |
          python --version
          python -m pip install --upgrade pip --trusted-host pypi.org --trusted-host pypi.python.org --trusted-host files.pythonhosted.org
          python -m pip install --trusted-host pypi.org --trusted-host pypi.python.org --trusted-host files.pythonhosted.org -r requirements-ci.txt
          python -m pip install --trusted-host pypi.org --trusted-host pypi.python.org --trusted-host files.pythonhosted.org -r profiles/packs/family/piper.txt
      - name: Run GRACE lint when available
        run: |
          if command -v grace >/dev/null 2>&1; then
            grace lint --path "$GITHUB_WORKSPACE"
          else
            echo "grace CLI is not available in CI image; skipping optional GRACE lint step"
          fi
      - name: Run runtime self-check
        run: python scripts/runtime_self_check.py
      - name: Run host matrix validation
        run: python scripts/validate_runtime.py host-matrix
      - name: Run unit and integration tests
        run: python -m pytest -m "unit or integration"

  test-windows:
    name: Windows validation
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        if: ${{ !env.ACT }}
        with:
          python-version: '3.11'
      - name: Install system dependencies
        if: ${{ !env.ACT }}
        shell: pwsh
        run: choco install ffmpeg -y --no-progress
      - name: Verify host dependencies under act
        if: ${{ env.ACT }}
        shell: cmd
        run: |
          py -3.11 --version
          ffmpeg -version
      - name: Install Python dependencies
        if: ${{ !env.ACT }}
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
      - name: Install Python dependencies under act
        if: ${{ env.ACT }}
        shell: cmd
        run: |
          py -3.11 -m pip install --upgrade pip
          py -3.11 -m pip install -r requirements-ci.txt
      - name: Run runtime self-check
        if: ${{ !env.ACT }}
        shell: pwsh
        run: python scripts/runtime_self_check.py
      - name: Run runtime self-check under act
        if: ${{ env.ACT }}
        shell: cmd
        run: py -3.11 scripts/runtime_self_check.py
      - name: Run host matrix validation
        if: ${{ !env.ACT }}
        shell: pwsh
        run: python scripts/validate_runtime.py host-matrix
      - name: Run host matrix validation under act
        if: ${{ env.ACT }}
        shell: cmd
        run: py -3.11 scripts/validate_runtime.py host-matrix
      - name: Run unit and integration tests
        if: ${{ !env.ACT }}
        shell: pwsh
        run: python -m pytest -m "unit or integration"
      - name: Run unit and integration tests under act
        if: ${{ env.ACT }}
        shell: cmd
        run: py -3.11 -m pytest -m "unit or integration"
