services:
  telegram-bot:
    build:
      context: .
      dockerfile: telegram_bot/Dockerfile
    image: qwen3-tts-telegram-bot:dev
    command: ["python", "-m", "telegram_bot"]
    environment:
      TTS_OUTPUTS_DIR: /app/.outputs
      TTS_TELEGRAM_BOT_TOKEN: ${TTS_TELEGRAM_BOT_TOKEN}
      TTS_TELEGRAM_SERVER_BASE_URL: ${TTS_TELEGRAM_SERVER_BASE_URL}
      TTS_TELEGRAM_ALLOWED_USER_IDS: ${TTS_TELEGRAM_ALLOWED_USER_IDS:-}
      TTS_TELEGRAM_ADMIN_USER_IDS: ${TTS_TELEGRAM_ADMIN_USER_IDS:-}
      TTS_TELEGRAM_DEV_MODE: ${TTS_TELEGRAM_DEV_MODE:-false}
      TTS_TELEGRAM_RATE_LIMIT_ENABLED: ${TTS_TELEGRAM_RATE_LIMIT_ENABLED:-true}
      TTS_TELEGRAM_RATE_LIMIT_PER_USER_PER_MINUTE: ${TTS_TELEGRAM_RATE_LIMIT_PER_USER_PER_MINUTE:-20}
      TTS_TELEGRAM_LOG_LEVEL: ${TTS_TELEGRAM_LOG_LEVEL:-info}
      TTS_TELEGRAM_DEFAULT_SPEAKER: ${TTS_TELEGRAM_DEFAULT_SPEAKER:-Vivian}
      TTS_TELEGRAM_MAX_TEXT_LENGTH: ${TTS_TELEGRAM_MAX_TEXT_LENGTH:-1000}
      TTS_TELEGRAM_DELIVERY_STORE_PATH: /app/.state/telegram_delivery_store.json
      TTS_TELEGRAM_POLL_INTERVAL_SECONDS: ${TTS_TELEGRAM_POLL_INTERVAL_SECONDS:-1.0}
      TTS_TELEGRAM_MAX_RETRIES: ${TTS_TELEGRAM_MAX_RETRIES:-3}
    volumes:
      - ./.outputs:/app/.outputs
      - telegram_bot_state:/app/.state
    restart: unless-stopped

volumes:
  telegram_bot_state:
